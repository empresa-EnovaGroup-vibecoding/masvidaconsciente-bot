name: Auto-desplegar el bot (viejo + nuevo)

# Cada vez que subes un cambio a la rama master, este flujo le ordena a los DOS
# servidores (viejo y nuevo) reconstruir el bot y su trabajador (worker).
# Así, un solo cambio actualiza ambos servidores, sin darle a "Deploy" a mano.
#
# Cómo funciona: le habla a la API de cada Coolify y le pide desplegar las apps
# por su identificador (uuid). Los tokens viven en los "Secrets" del repositorio
# (Settings -> Secrets and variables -> Actions), NO están escritos aquí.

on:
  push:
    branches: [master]
  workflow_dispatch: {}   # También se puede lanzar a mano desde la pestaña "Actions".

jobs:
  desplegar:
    runs-on: ubuntu-latest
    steps:
      - name: Servidor VIEJO (bot + worker)
        run: |
          curl -fsS --max-time 90 \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_OLD_TOKEN }}" \
            "http://2.25.139.106:8000/api/v1/deploy?uuid=qlfrx5yviileijm6lmovy67i,erzq5ycbrs323vwkcbam54a9"

      - name: Servidor NUEVO (bot + worker)
        if: always()   # Corre aunque el paso anterior falle, para no dejar un servidor sin actualizar.
        run: |
          curl -fsS --max-time 90 \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_NEW_TOKEN }}" \
            "http://152.53.89.118:8000/api/v1/deploy?uuid=y20mosanb19cw8ukso56hv7e,hrkrh8f9buora7aqxt8rsbna"
