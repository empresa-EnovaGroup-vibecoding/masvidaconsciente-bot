name: Desplegar el bot (taller en cada push · producción a mano)

# ANTES: cada push a master reconstruía el bot en LOS DOS servidores a la vez, así que no se
# podía probar en el taller sin tocar producción. (Deuda A1 de la auditoría 2026-07-13.)
#
# AHORA:
#   • Un push a master  ->  despliega SOLO el TALLER (Hostinger viejo, el número de pruebas):
#     bot + worker.
#   • Producción (netcup, clientes reales)  ->  SOLO a mano: se lanza este flujo desde la pestaña
#     "Actions" con la casilla "produccion" marcada (o con `gh workflow run deploy.yml
#     -f produccion=true`). Así producción NUNCA se toca sin que un humano lo decida.
#
# Los tokens viven en los "Secrets" del repositorio (Settings -> Secrets and variables -> Actions).

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      produccion:
        description: 'Marca esta casilla para desplegar TAMBIÉN a producción (netcup, clientes reales). Sin marcar = solo el taller.'
        type: boolean
        default: false

jobs:
  # ✅ EL PORTERO (fase 0). ANTES este flujo no hacía ni `checkout`: mandaba el `curl` a Coolify
  # y probaba DESPUÉS, dentro del contenedor ya desplegado. O sea: el código roto SÍ llegaba al
  # taller, y el único freno era acordarse de no promoverlo.
  #
  # Ahora hay una puerta ANTES del despliegue. Si esto sale rojo, el `curl` no llega a correr.
  # Corre en segundos y no toca ni la BD, ni Redis, ni OpenRouter, ni WhatsApp.
  #
  # Lo que NO hace: los 10 BANCOS que tocan la base siguen corriendo DESPUÉS del despliegue
  # (paso "LOS BANCOS"), porque necesitan un Postgres vivo. Esta puerta y aquel vigilante son
  # complementarios: esta caza lo que se ve leyendo el código; aquel, lo que solo se ve corriéndolo.
  verificar:
    name: Verificar (ruff · compileall · pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # la misma que el Dockerfile (python:3.12-slim)
          cache: pip

      - name: Instalar dependencias de desarrollo
        # requirements-dev.txt incluye a requirements.txt: los tests importan `app.*`,
        # que necesita fastapi/sqlalchemy/httpx aunque no los llame.
        run: pip install -r requirements-dev.txt

      - name: ruff — el linter
        run: ruff check .

      - name: compileall — que todo parsee (la regla de CLAUDE.md §3)
        run: python -m compileall -q app

      - name: pytest — LAS REDES DE SEGURIDAD, caso por caso
        # Cada red nació de un incidente real con un cliente. Hasta hoy solo se comprobaban
        # DESPUÉS de desplegar. Ahora un cambio que rompa una red no llega ni al taller.
        run: pytest

  desplegar:
    needs: verificar   # 🔒 sin la puerta en verde, no se despliega nada
    runs-on: ubuntu-latest
    steps:
      - name: TALLER (siempre — bot + worker, Hostinger viejo, tu número de pruebas)
        run: |
          curl -fsS --connect-timeout 20 --max-time 120 --retry 3 --retry-all-errors --retry-delay 5 \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_OLD_TOKEN }}" \
            "http://2.25.139.106:8000/api/v1/deploy?uuid=qlfrx5yviileijm6lmovy67i,erzq5ycbrs323vwkcbam54a9"

      # 🛡️ EL VIGILANTE (deuda D2, cerrada 2026-07-14): después de CADA despliegue del taller,
      # los 10 bancos de prueba corren SOLOS dentro del contenedor nuevo. Si alguno sale ROJO:
      # (1) este flujo queda ROJO aquí en GitHub, y (2) a la dueña le llega un WhatsApp
      # (scripts/correr_bancos.py). La regla "si sale rojo, no se despliega a producción" ya
      # no depende de que un humano se acuerde de correrlos por SSH.
      - name: LOS BANCOS (el taller se prueba SOLO — si algo se rompió, esto queda ROJO)
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.TALLER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 root@2.25.139.106 \
            'bash -s' -- "$GITHUB_SHA" <<'SCRIPT'
          set -e
          SHA="$1"
          echo "Esperando a que el contenedor NUEVO (commit $SHA) esté corriendo…"
          BOT=""
          for i in $(seq 1 60); do
            BOT=$(docker ps --format '{{.Names}} {{.Image}}' | grep '^qlfrx' | grep "$SHA" | head -1 | cut -d' ' -f1 || true)
            WORKER=$(docker ps --format '{{.Names}} {{.Image}}' | grep '^erzq' | grep "$SHA" | head -1 | cut -d' ' -f1 || true)
            if [ -n "$BOT" ] && [ -n "$WORKER" ]; then break; fi
            sleep 15
          done
          if [ -z "$BOT" ] || [ -z "$WORKER" ]; then
            echo "🔴 El contenedor con el commit $SHA nunca arrancó (¿falló el build en Coolify?)"
            exit 1
          fi
          echo "Contenedores nuevos: bot=$BOT worker=$WORKER — corriendo los bancos…"
          docker exec -w /app -e PYTHONPATH=/app "$BOT" python scripts/correr_bancos.py
          SCRIPT

      - name: PRODUCCIÓN (solo a mano y con la casilla marcada — bot + worker, netcup, clientes reales)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.produccion }}
        run: |
          curl -fsS --connect-timeout 20 --max-time 120 --retry 3 --retry-all-errors --retry-delay 5 \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_NEW_TOKEN }}" \
            "http://152.53.89.118:8000/api/v1/deploy?uuid=y20mosanb19cw8ukso56hv7e,hrkrh8f9buora7aqxt8rsbna"
